<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <link rel="stylesheet" href="styles/common.css" />
</head>

<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="add-student.html">Add Student</a>
    </nav>
    <main>
        <h1>Edit Student</h1>
        <form action="#" method="post">
            <div>
                <label for="student-name">Student Name</label>
                <input id="student-name" name="studentName" type="text" required>
            </div>
            <div>
                <label for="student-class">Class</label>
                <input id="student-class" name="studentClass" type="text" required>
            </div>
            <div>
                <label for="student-gender">Gender</label>
                <select id="student-gender" name="studentGender" required>
                    <option value="">Select gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div>
                <label for="student-age">Age</label>
                <input id="student-age" name="studentAge" type="number" min="1" required>
            </div>
            <div>
                <button type="submit">Save Changes</button>
            </div>
        </form>
        <p><a href="index.html">Back to Home</a></p>
    </main>
</body>

</html>
