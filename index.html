<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="styles/index.css" />
</head>

<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="add-student.html">Add Student</a>
    </nav>
    <main>
        <h1>Student Manager</h1>
        <div>
            <label for="student-search">Search students:</label>
            <input id="student-search" type="search" placeholder="Search by name, class, gender, or age">
        </div>
        <table>
            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Class</th>
                    <th>Gender</th>
                    <th>Age</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>John Doe</td>
                    <td>10A</td>
                    <td>Male</td>
                    <td>15</td>
                    <td>
                        <a href="edit-student.html?name=John%20Doe&class=10A&gender=Male&age=15"><button type="button">
                                <span class="material-symbols-outlined">
                                    edit
                                </span>
                            </button></a>
                        <button type="button">
                            <span class="material-symbols-outlined">
                                delete
                            </span>
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>
    <div id="fruits">
    </div>
    <script src="js/index.js"></script>
</body>

</html>
