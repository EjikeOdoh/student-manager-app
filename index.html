<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="styles/index.css" />
</head>

<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="add-student.html">Add Student</a>
    </nav>
    <main>
        <h1>Student Manager</h1>
        <div  class="search-box">
            <label for="student-search">Search students:</label>
            <input id="student-search" type="search" placeholder="Search by name, class, gender, or age">
        </div>
        <table>
            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Class</th>
                    <th>Gender</th>
                    <th>Age</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>

        <form>
            <h1>Add Student</h1>
            <div>
                <label for="student-name">Student Name</label>
                <input id="student-name" name=""  required type="email">
            </div>
            <div>
                <label for="student-class">Class</label>
                <input id="student-class" name="studentClass" type="text">
            </div>
            <div>
                <label for="student-gender">Gender</label>
                <select id="student-gender" name="studentGender">
                    <option value="">Select gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div>
                <label for="student-age">Age</label>
                <input id="student-age" name="studentAge" type="number" min="1">
            </div>
            <button>Create Student</button>
        </form>
    </main>

    <script src="js/index.js"></script>
</body>

</html>
